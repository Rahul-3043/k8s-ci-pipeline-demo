apiVersion: v1
kind: Pod
metadata:
  labels:
    app: jenkins-agent
spec:
  containers:

  - name: node
    image: node:18
    command: ["sleep","9999"]

  - name: python
    image: python:3.10
    command: ["sleep","9999"]

  - name: docker
    image: docker:24
    securityContext:
      privileged: true
    command: ["sleep","9999"]

  - name: helm
    image: alpine/helm:3.12
    command: ["sleep","9999"]

  - name: kubectl
    image: bitnami/kubectl:latest
    command: ["sleep","9999"]
